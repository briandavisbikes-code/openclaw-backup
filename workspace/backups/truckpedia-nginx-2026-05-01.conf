# TruckPedia Nginx Config
# Backup from: 2026-05-01
# VM: truckpedia-vm (us-west1-b)
# External IP: 8.231.218.184 (note: IP changed after VM stop/restart)
# SSH Key: ~/.ssh/gcp_vm_key (ED25519)

server {
 listen 80;
 server_name www.truckpedia.net api.truckpedia.net;
 return 301 https://$host$request_uri;
}

server {
 listen 443 ssl;
 server_name www.truckpedia.net api.truckpedia.net;

 ssl_certificate /etc/letsencrypt/live/api.truckpedia.net/fullchain.pem;
 ssl_certificate_key /etc/letsencrypt/live/api.truckpedia.net/privkey.pem;

 root /home/briandavisbikes/api/public;
 index index.html;

 location / {
 try_files $uri $uri/ @proxy;
 }

 location /fight/ {
 alias /var/www/game/;
 index fight.html;
 }

 location @proxy {
 proxy_pass http://localhost:3001;
 proxy_http_version 1.1;
 proxy_set_header Upgrade $http_upgrade;
 proxy_set_header Connection 'upgrade';
 proxy_set_header Host $host;
 proxy_set_header X-Real-IP $remote_addr;
 proxy_cache_bypass $http_upgrade;
 }
}